apiVersion: batch/v1
kind: CronJob
metadata:
  name: rhacs-fam-trigger
  namespace: default   # change as needed
spec:
  schedule: "*/10 * * * *"   # every 10 minutes (adjust or use "0 * * * *" for hourly)
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: trigger
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            command:
            - /bin/sh
            - -c
            - |
              echo "[$(date)] Triggering RHACS file access policy on /etc/passwd"
              # These commands will trigger both Effective Path and Actual Path checks
              touch /etc/passwd || echo "touch failed (expected if read-only FS)"
              cat /etc/passwd > /dev/null || true
              echo "ls -l /etc/passwd"
              ls -l /etc/passwd
              echo "Trigger complete - alert should appear in RHACS shortly"
            securityContext:
              runAsUser: 1000   # non-root is fine and more realistic
              allowPrivilegeEscalation: false
          nodeSelector:
            node-role.kubernetes.io/worker: ""   # optional: run only on workers