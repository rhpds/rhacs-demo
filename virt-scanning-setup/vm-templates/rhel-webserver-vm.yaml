apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: rhel-webserver
  namespace: default
  annotations:
    description: RHEL webserver VM with reliable cloud-init password + subscription + httpd
  labels:
    app: rhel-webserver
    os.template.kubevirt.io/rhel9: "true"
spec:
  runStrategy: Always
  template:
    metadata:
      annotations:
        vm.kubevirt.io/flavor: small
        vm.kubevirt.io/os: rhel9
        vm.kubevirt.io/workload: server
      labels:
        kubevirt.io/domain: rhel-webserver
        kubevirt.io/size: small
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        devices:
          autoattachVSOCK: true
          disks:
            - disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - masquerade: {}
              model: virtio
              name: default
          networkInterfaceMultiqueue: true
          rng: {}
        memory:
          guest: 2Gi
      hostname: rhel-web-01
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - name: rootdisk
          containerDisk:
            image: registry.redhat.io/rhel9/rhel-guest-image:latest
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |-
              #cloud-config
              hostname: rhel-web-01
              fqdn: rhel-web-01.example.local

              users:
                - default
                - name: cloud-user
                  lock_passwd: false
                  sudo: ALL=(ALL) NOPASSWD:ALL
                  groups: wheel
                  shell: /bin/bash

              chpasswd:
                users:
                  - name: cloud-user
                    password: redhat
                    type: text
                expire: false

              ssh_pwauth: true

              packages:
                - httpd
                - firewalld
                - curl
                - vim
                - git

              write_files:
                - path: /etc/ssh/sshd_config.d/zz-enable-password.conf
                  content: |
                    PasswordAuthentication yes
                  permissions: '0600'
                  owner: root:root

              runcmd:
                # Aggressive cleanup of regenerating SSH drop-in
                - rm -f /etc/ssh/sshd_config.d/50-cloud-init.conf || true
                - systemctl restart sshd

                # Firewall
                - firewall-cmd --permanent --add-service=ssh --add-service=http --add-service=https || true
                - firewall-cmd --reload || true

                # Start services
                - systemctl enable --now httpd firewalld sshd

                # Repo fallback
                - subscription-manager repos --enable=rhel-*-for-x86_64-baseos-rpms --enable=rhel-*-for-x86_64-appstream-rpms || true

                # Reliable test page (fixed quoting)
                - echo '<!DOCTYPE html><html><head><title>RHEL Web Server</title></head><body><h1>It works!</h1><p>Hostname: '"'"'$(hostname)'"'"'</p><p>IP: '"'"'$(hostname -I | awk '"'"'{print $1}'"'"')'"'"'</p></body></html>' > /var/www/html/index.html

                # Debug logs
                - subscription-manager status > /var/log/subscription-status.log 2>&1 || true
                - echo "Cloud-init done" >> /var/log/cloud-init-test.log

              output:
                all: |-
                  tee -a /var/log/cloud-init-output.log
              final_message: "System up after $UPTIME seconds"