apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: rhel-webserver
  namespace: default  # change if needed
  annotations:
    description: RHEL webserver VM with cloud-init password access
  labels:
    app: rhel-webserver
    os.template.kubevirt.io/rhel10: 'true' 
spec:
  runStrategy: Always  
  template:
    metadata:
      annotations:
        vm.kubevirt.io/flavor: small
        vm.kubevirt.io/os: rhel10
        vm.kubevirt.io/workload: server
      labels:
        kubevirt.io/domain: rhel-webserver
        kubevirt.io/size: small
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        devices:
          disks:
            - disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - masquerade: {}
              model: virtio
              name: default
          networkInterfaceMultiqueue: true
          rng: {}
        memory:
          guest: 2Gi
      hostname: rhel-web-01
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - name: rootdisk
          containerDisk:
            image: registry.redhat.io/rhel10/rhel-guest-image  # add :10.0 or :latest if pulls fail
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |-
                  #cloud-config
                  hostname: rhel-web-01
                  fqdn: rhel-web-01.example.local
            
                  users:
                    - default   # preserves cloud-user
            
                  chpasswd:
                    list: |
                      cloud-user: redhat
                    expire: false
            
                  ssh_pwauth: true
            
                  # High-priority override for SSH (lex order: 05- beats 50-)
                  write_files:
                    - path: /etc/ssh/sshd_config.d/05-force-password.conf
                      content: |
                        PasswordAuthentication yes
                      permissions: '0600'
                      owner: root:root
            
                  runcmd:
                    - systemctl restart sshd
                    - firewall-cmd --permanent --add-service=ssh || true
                    - firewall-cmd --reload || true
                    - echo "Cloud-init ran - check /var/log/cloud-init.log" > /var/log/cloud-init-status.log
                    - sshd -T | grep -i passwordauthentication >> /var/log/cloud-init-status.log  # debug SSH effective config
                    - grep cloud-user /etc/shadow >> /var/log/cloud-init-status.log  # debug: show if password hash set
            
                  final_message: "cloud-init finished - try console/SSH as cloud-user:redhat"