apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: rhel-webserver
  namespace: default
  labels:
    app: rhel-webserver
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: rhel-webserver
        kubevirt.io/size: small
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        devices:
          autoattachVSOCK: true
          disks:
            - bootOrder: 1
              disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - masquerade: {}
              model: virtio
              name: default
          rng: {}
        features:
          acpi: {}
          smm:
            enabled: true
        firmware:
          bootloader:
            efi: {}
        machine:
          type: pc-q35-rhel9.6.0   # Matches RHEL 9/10 compat
        memory:
          guest: 2Gi
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - dataVolume:
            name: rhel-webserver   # Will create/manage the PVC
          name: rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |-
              #cloud-config
              user: cloud-user
              password: redhat
              chpasswd: { expire: false }
              runcmd:
                - sudo subscription-manager register --org="$SUBSCRIPTION_ORG_ID" --activationkey="$SUBSCRIPTION_ACTIVATION_KEY"
                - sudo subscription-manager release --set=9.4
                - |
                  sudo subscription-manager repos \
                    --enable=rhel-9-for-x86_64-baseos-eus-rpms \
                    --enable=rhel-9-for-x86_64-appstream-eus-rpms
                - sudo dnf clean all
                - sudo dnf update -y
                # Install additional packages for security demo (commonly flagged in vulnerability scans)
                - |
                  sudo dnf install -y \
                    httpd curl wget openssl openssl-libs zlib libxml2 \
                    ghostscript perl nginx tar gzip nmap-ncat bzip2 zip unzip \
                    freetype libjpeg-turbo libtiff libpng gnutls 2>/dev/null || true
                # Download the latest roxagent binary; run every 10 minutes via /etc/cron.d (no systemd unit required)
                - curl -L -f -o /tmp/roxagent https://mirror.openshift.com/pub/rhacs/assets/4.10.0/bin/linux/roxagent
                - chmod +x /tmp/roxagent
                - sudo mv /tmp/roxagent /usr/local/bin/roxagent
                - sudo restorecon -v /usr/local/bin/roxagent
                - |
                  printf '%s\n' \
                    'SHELL=/bin/bash' \
                    'PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin' \
                    'MAILTO=root' \
                    '# Run roxagent every 10 minutes as root' \
                    '*/10 * * * * root /usr/local/bin/roxagent --daemon' \
                  | sudo tee /etc/cron.d/roxagent > /dev/null
                - sudo chmod 644 /etc/cron.d/roxagent
                - sudo restorecon -vF /etc/cron.d/roxagent
                - sudo systemctl restart crond
                - sudo dnf update -y
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: rhel-webserver
      spec:
        sourceRef:
          kind: DataSource
          name: rhel9
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 30Gi