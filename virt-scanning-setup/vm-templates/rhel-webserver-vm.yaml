# RHEL webserver VM - apply directly: oc apply -f vm-templates/rhel-webserver-vm.yaml
# Requires: OpenShift Virtualization, registry.redhat.io pull secret (for image), RHACS (for VSOCK)
# Start: virtctl start rhel-webserver -n default
# Console: virtctl console rhel-webserver -n default (login: cloud-user / redhat)
# Note: Change image to rhel10/rhel-guest-image:latest if RHEL 10 is available
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: rhel-webserver
  namespace: default
  annotations:
    description: RHEL webserver VM with cloud-init password access + auto-subscription + basic httpd
  labels:
    app: rhel-webserver
    os.template.kubevirt.io/rhel9: "true"  # update to rhel10 if using RHEL 10 image
spec:
  runStrategy: Always
  template:
    metadata:
      annotations:
        vm.kubevirt.io/flavor: small
        vm.kubevirt.io/os: rhel9
        vm.kubevirt.io/workload: server
      labels:
        kubevirt.io/domain: rhel-webserver
        kubevirt.io/size: small
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        devices:
          autoattachVSOCK: true  # Required for roxagent vsock communication
          disks:
            - disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - masquerade: {}
              model: virtio
              name: default
          networkInterfaceMultiqueue: true
          rng: {}
        memory:
          guest: 2Gi
      hostname: rhel-web-01
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - name: rootdisk
          containerDisk:
            image: registry.redhat.io/rhel9/rhel-guest-image:latest  # or :rhel10/... if available
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |-
              #cloud-config
              hostname: rhel-web-01
              fqdn: rhel-web-01.example.local

              users:
                - default
                - name: cloud-user
                  lock_passwd: false
                  sudo: ALL=(ALL) NOPASSWD:ALL
                  groups: wheel

              chpasswd:
                list: |
                  cloud-user:redhat
                expire: false

              ssh_pwauth: true

              # Auto-register with Red Hat Subscription Manager using username/password
              rh_subscription:
                username: <YOUR_REDHAT_USERNAME>          # e.g., michael.foster@example.com
                password: <YOUR_REDHAT_PASSWORD>          # Quote if special chars: 'P@ssw0rd!'
                # auto_attach: true                       # Optional: auto-attach available subscriptions

              # Install basic web server packages
              packages:
                - httpd               # Apache web server
                - firewalld           # Firewall management
                - curl                # For testing connectivity
                - vim                 # Basic editor
                - git                 # Version control (useful for web content)

              write_files:
                - path: /etc/ssh/sshd_config.d/zz-enable-password.conf
                  content: |
                    PasswordAuthentication yes
                  permissions: '0600'
                  owner: root:root

                # Simple welcome page to verify web server works
                - path: /var/www/html/index.html
                  content: |
                    <!DOCTYPE html>
                    <html lang="en">
                    <head>
                      <meta charset="UTF-8">
                      <title>RHEL Web Server - Cloud-Init Deployed</title>
                    </head>
                    <body>
                      <h1>It works!</h1>
                      <p>This is a basic RHEL web server deployed via cloud-init on OpenShift Virtualization.</p>
                      <p>Hostname: <strong>$(hostname)</strong></p>
                      <p>IP: <strong>$(hostname -I | awk '{print $1}')</strong></p>
                      <p>Generated at boot time.</p>
                    </body>
                    </html>
                  permissions: '0644'
                  owner: root:root

              runcmd:
                # Clean up conflicting cloud-init SSH drop-in
                - rm -f /etc/ssh/sshd_config.d/50-cloud-init.conf || true
                - systemctl restart sshd

                # Firewall configuration
                - firewall-cmd --permanent --add-service=ssh || true
                - firewall-cmd --permanent --add-service=http || true
                - firewall-cmd --permanent --add-service=https || true
                - firewall-cmd --reload || true

                # Start and enable web server
                - systemctl enable --now httpd

                # Post-registration: ensure key repos are enabled
                - subscription-manager repos --enable=rhel-*-for-x86_64-baseos-rpms --enable=rhel-*-for-x86_64-appstream-rpms || true

                - echo "Cloud-init completed - web server should be running" >> /var/log/cloud-init-test.log

              output:
                all: |-
                  tee -a /var/log/cloud-init-output.log
              final_message: "System is up after $UPTIME seconds"