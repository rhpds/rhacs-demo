apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: rhel-webserver
  namespace: default  # change if needed
  annotations:
    description: RHEL webserver VM with cloud-init password access
  labels:
    app: rhel-webserver
    os.template.kubevirt.io/rhel10: 'true' 
spec:
  runStrategy: Always  
  template:
    metadata:
      annotations:
        vm.kubevirt.io/flavor: small
        vm.kubevirt.io/os: rhel10
        vm.kubevirt.io/workload: server
      labels:
        kubevirt.io/domain: rhel-webserver
        kubevirt.io/size: small
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        devices:
          disks:
            - disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - masquerade: {}
              model: virtio
              name: default
          networkInterfaceMultiqueue: true
          rng: {}
        memory:
          guest: 2Gi
      hostname: rhel-web-01
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - name: rootdisk
          containerDisk:
            image: registry.redhat.io/rhel10/rhel-guest-image  # confirm exact tag if needed (e.g., :latest or :10.0)
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |-
              #cloud-config
              hostname: rhel-web-01
              fqdn: rhel-web-01.example.local

              users:
                - default
                - name: admin
                  lock_passwd: false
                  sudo: ALL=(ALL) NOPASSWD:ALL
                  groups: wheel

              chpasswd:
                list: |
                  admin:redhat
                expire: false

              ssh_pwauth: true

              write_files:
                - path: /etc/ssh/sshd_config.d/zz-enable-password.conf
                  content: |
                    PasswordAuthentication yes
                  permissions: '0600'
                  owner: root:root

              runcmd:
                - rm -f /etc/ssh/sshd_config.d/50-cloud-init.conf || true
                - systemctl restart sshd
                - firewall-cmd --permanent --add-service=ssh || true
                - firewall-cmd --reload || true
                - echo "Cloud-init completed - password should be set" >> /var/log/cloud-init-test.log

              output:
                all: |-
                  tee -a /var/log/cloud-init-output.log
              final_message: "System is up after $UPTIME seconds"