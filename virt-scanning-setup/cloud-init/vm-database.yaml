# VirtualMachine manifest for rhel-database
# Prerequisites:
#   1. Create cloud-init secret first:
#      oc create secret generic cloudinit-database --from-file=userdata=cloud-init-userdata-database.yaml -n <namespace>
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: rhel-database
  namespace: default
  labels:
    app: rhacs-vm-scanning
    profile: database
    roxagent: enabled
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        app: rhacs-vm-scanning
        profile: database
        roxagent: enabled
        kubevirt.io/vm: rhel-database
    spec:
      domain:
        cpu:
          cores: 2
        devices:
          autoattachVSOCK: true
          disks:
          - name: containerdisk
            disk:
              bus: virtio
          - name: cloudinitdisk
            disk:
              bus: virtio
          interfaces:
          - name: default
            masquerade: {}
        resources:
          requests:
            memory: 4Gi
      networks:
      - name: default
        pod: {}
      volumes:
      - name: containerdisk
        containerDisk:
          image: registry.redhat.io/rhel9/rhel-guest-image:latest
      - name: cloudinitdisk
        cloudInitNoCloud:
          secretRef:
            name: cloudinit-database
