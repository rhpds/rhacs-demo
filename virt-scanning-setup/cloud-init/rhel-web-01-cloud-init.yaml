#cloud-config

hostname: rhel-web-01
fqdn: rhel-web-01.example.local

users:
  - default
  - name: cloud-user
    lock_passwd: false          # Explicitly allow password login (prevents !! lock in /etc/shadow)
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: wheel, systemd-journal
    shell: /bin/bash

# Set password reliably — use this format (users list instead of chpasswd.list)
chpasswd:
  users:
    - name: cloud-user
      password: redhat
      type: text                # Ensures plain text, not hash
  expire: false

ssh_pwauth: true

# Your override — use 'zz-' so it sorts last
write_files:
  - path: /etc/ssh/sshd_config.d/zz-enable-password.conf
    content: |
      PasswordAuthentication yes
      # Optional: if you ever want root ssh too (not recommended by default)
      # PermitRootLogin yes
    permissions: '0600'
    owner: root:root

packages:
  - httpd
  - firewalld

# Disable problematic cloud-init behavior, fix SSH, then firewall/httpd
runcmd:
  - sed -i 's/- set_passwords/- [set_passwords, once-per-instance]/' /etc/cloud/cloud.cfg || true
  - rm -f /etc/ssh/sshd_config.d/50-cloud-init.conf || true
  - systemctl restart sshd
  - firewall-cmd --permanent --add-service=ssh
  - firewall-cmd --permanent --add-service=http
  - firewall-cmd --permanent --add-service=https
  - firewall-cmd --reload
  - systemctl enable --now firewalld httpd sshd   # Ensure sshd is enabled too

  # Test page
  - |
    echo '<!DOCTYPE html>
    <html><head><title>Hello from RHEL on OpenShift</title></head>
    <body>
      <h1>It works! (cloud-init built this)</h1>
      <p>Hostname: '"$(hostname)"'</p>
      <p>IP: '"$(hostname -I | awk "{print \$1}")"'</p>
    </body></html>' > /var/www/html/index.html

# Keep your logging
output:
  all: |-
    tee -a /var/log/cloud-init-output.log
final_message: "The system is finally up, after $UPTIME seconds"
