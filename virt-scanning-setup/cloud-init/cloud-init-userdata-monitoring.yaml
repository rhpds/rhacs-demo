#cloud-config
# Cloud-init userdata for rhel-monitoring VM
# REQUIRED: Add your bastion SSH public key under ssh_authorized_keys for virtctl ssh (key-based auth only)
hostname: rhel-monitoring
fqdn: rhel-monitoring.local

users:
  - name: cloud-user
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: false
    # REQUIRED - add your bastion SSH public key:
    ssh_authorized_keys:
      - REPLACE_WITH_YOUR_SSH_PUBLIC_KEY

runcmd:
  # Configure SSH for key-based auth only (no password)
  - sed -i 's/^#*PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
  - sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - grep -q '^PubkeyAuthentication' /etc/ssh/sshd_config || echo 'PubkeyAuthentication yes' >> /etc/ssh/sshd_config
  - grep -q '^PasswordAuthentication' /etc/ssh/sshd_config || echo 'PasswordAuthentication no' >> /etc/ssh/sshd_config
  - systemctl restart sshd
  # Wait for network
  - until ping -c 1 8.8.8.8 &> /dev/null; do sleep 2; done
  # Create roxagent directory
  - mkdir -p /opt/roxagent
  - chmod 755 /opt/roxagent
  # Download roxagent binary
  - |
    echo "Downloading roxagent..."
    curl -k -L -o /opt/roxagent/roxagent "https://mirror.openshift.com/pub/rhacs/assets/4.9.2/bin/linux/roxagent"
    chmod +x /opt/roxagent/roxagent
  # Create systemd service for roxagent
  - |
    cat > /etc/systemd/system/roxagent.service <<'SYSTEMD_EOF'
    [Unit]
    Description=StackRox VM Agent for vulnerability scanning
    After=network-online.target
    Wants=network-online.target
    [Service]
    Type=simple
    ExecStart=/opt/roxagent/roxagent --daemon --index-interval=5m --verbose
    Restart=always
    RestartSec=10
    Environment="ROX_VIRTUAL_MACHINES_VSOCK_PORT=818"
    Environment="ROX_VIRTUAL_MACHINES_VSOCK_CONN_MAX_SIZE_KB=16384"
    StandardOutput=journal
    StandardError=journal
    [Install]
    WantedBy=multi-user.target
    SYSTEMD_EOF
  - systemctl daemon-reload
  - systemctl enable roxagent
  - systemctl start roxagent
  # Create package install script (run after subscription registration)
  - |
    cat > /root/install-packages.sh <<'PKG_SCRIPT'
    #!/bin/bash
    echo "Installing packages for monitoring profile..."
    dnf install -y grafana telegraf collectd collectd-utils net-snmp net-snmp-utils
    echo "Packages installed."
    PKG_SCRIPT
  - chmod +x /root/install-packages.sh
  - echo "VM ready. To install packages: Register subscription and run /root/install-packages.sh"

final_message: "RHEL VM monitoring is ready. Register subscription to install packages."
