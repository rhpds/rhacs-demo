# Secret consumed by Tekton tasks and by Pipelines rox-pipeline and rox-log4shell-pipeline
# (params rox_central_endpoint / rox_api_token reference this Secret by name: roxsecrets).
#
# Do not "oc apply" this file as-is: stringData below are placeholders.
# Run openshift-pipelines-setup/install.sh — it reads ~/.bashrc the same way as other setup
# scripts, then applies an equivalent Secret with:
#   - stringData.rox_central_endpoint  ← ROXCTL_CENTRAL_ENDPOINT if set, else Central route
#     in RHACS_NAMESPACE (default stackrox) or ROX_CENTRAL_ADDRESS (host:port, no https://)
#   - stringData.rox_api_token         ← API_TOKEN if set, else ROX_API_TOKEN
#
# Namespace defaults to pipeline-demo; override with PIPELINE_NAMESPACE when running install.sh.
apiVersion: v1
kind: Secret
metadata:
  name: roxsecrets
  namespace: pipeline-demo
type: Opaque
stringData:
  rox_central_endpoint: "ROXCTL_CENTRAL_ENDPOINT"
  rox_api_token: "API_TOKEN"
